name: Keyword Pipeline — Cluster + Classify + Score

on:
  push:
    paths:
      - 'data/keywords_to_score.csv'   # score + cluster khi có keywords mới
      - 'data/training_data.csv'        # retrain khi update data
  workflow_dispatch:
    inputs:
      retrain:
        description: 'Force retrain model (yes/no)'
        required: false
        default: 'no'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (with retrain)
        if: ${{ github.event.inputs.retrain == 'yes' || contains(github.event.head_commit.message, '[retrain]') }}
        run: |
          python keyword_pipeline.py run \
            --keywords data/keywords_to_score.csv \
            --training data/training_data.csv \
            --model model.pkl \
            --output output/ \
            --retrain

      - name: Run pipeline (use existing model)
        if: ${{ github.event.inputs.retrain != 'yes' && !contains(github.event.head_commit.message, '[retrain]') }}
        run: |
          python keyword_pipeline.py run \
            --keywords data/keywords_to_score.csv \
            --training data/training_data.csv \
            --model model.pkl \
            --output output/

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results-${{ github.run_number }}
          path: output/
          retention-days: 30
